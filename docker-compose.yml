services:
  client:
    build:
      context: ./client
    ports:
      - 4200:4200
    depends_on:
      - server
  server:
    build:
      context: ./server
    ports:
      - 8080:8080
    volumes:
      - ./server/prisma:/app/prisma
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5044
    networks:
      - default
      - elk

networks:
  elk:
    external: true
    name: orion-crm_elk
